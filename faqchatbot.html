<!DOCTYPE html>
<html>
<head>
    <title>FAQ Chatbot</title>
</head>
<body>
<h2>FAQ Chatbot</h2>

<input type="text" id="userInput" placeholder="Ask a question" style="width:300px">
<button onclick="getAnswer()">Send</button>

<h3>Response:</h3>
<p id="response"></p>
<script>
let faqs = [
    {q: "hello", a: "Hello! How can I help you?"},
    {q: "price", a: "The price is 1000 Rs."},
    {q: "time", a: "We are open from 9 AM to 5 PM."},
    {q: "location", a: "We are located in Rawalpindi."},
    {q: "contact", a: "You can contact us at 0300-1234567."}
];
function getAnswer(){
    let input = document.getElementById("userInput").value.toLowerCase();
    let answer = "Sorry, I don't understand your question.";

    for(let i=0; i<faqs.length; i++){
        if(input.includes(faqs[i].q)){
            answer = faqs[i].a;
            break;
        }
    }

    document.getElementById("response").innerText = answer;
}
</script>
</body>
</html>
